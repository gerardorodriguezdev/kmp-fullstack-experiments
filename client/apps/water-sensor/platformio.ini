[platformio]
lib_dir = lib/

[env:main]
platform = atmelavr
board = uno
framework = arduino
build_flags = -std=gnu++17
build_unflags = -std=gnu++11
build_src_filter = +<main.cpp>

[env:setup]
platform = atmelavr
board = uno
framework = arduino
build_flags = -std=gnu++17
build_unflags = -std=gnu++11
build_src_filter = +<provisioning/setup.cpp>