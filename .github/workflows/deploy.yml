name: Deploy

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

defaults:
  run:
    shell: bash

jobs:
  deploy:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup-action

      - name: Select environment client user mobile
        uses: ./.github/actions/select-environment-client-user-mobile

      - name: Build client user app android
        uses: ./.github/actions/build-client-user-android

      - name: Build client user app ios
        uses: ./.github/actions/build-client-user-ios

      - name: Build client water level sensor
        uses: ./.github/actions/build-client-water-level-sensor

      - name: Build and publish home app
        uses: ./.github/actions/build-and-publish-client-home
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish server app
        uses: ./.github/actions/build-and-publish-server-app
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish clients
        uses: ./.github/actions/publish-client-user-mobile