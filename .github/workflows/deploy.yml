name: Deploy

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  deploy:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup-action

      - name: Build and upload client user app
        uses: ./.github/actions/build-client-user

      - name: Build and publish home app
        uses: ./.github/actions/build-and-publish-home

      - name: Build and publish server app
        uses: ./.github/actions/build-and-publish-server