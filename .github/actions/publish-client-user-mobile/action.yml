name: Publish client user mobile

runs:
  using: "composite"
  steps:
    - name: Publish client user mobile
      uses: softprops/action-gh-release@v3
      with:
        files: |
          ./client/apps/user/androidApp/build/outputs/apk/release/core-release.apk
          ./client/apps/user/iosApp/build/oneclick.ipa