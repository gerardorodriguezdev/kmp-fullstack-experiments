name: Build and publish server app

runs:
  using: composite
  steps:
    - name: Generate environment
      shell: bash
      run: |
        ./gradlew :server:services:app:generateEnvironment -Penvironment="production(jvm[IMAGE_NAME=service-app-production,IMAGE_PORT=8080,IMAGE_TAG=${{ github.sha }},REGISTRY_LOCATION=ghcr.io/${{ github.repository }},REGISTRY_USERNAME=${{ github.actor }},REGISTRY_PASSWORD=${{ secrets.GITHUB_TOKEN }}])"

    - name: Select environment
      shell: bash
      run: |
        ./gradlew :server:services:app:selectEnvironment -PnewSelectedEnvironment=production

    - name: Publish image
      shell: bash
      run: |
        ./gradlew :server:services:app:publishImage
