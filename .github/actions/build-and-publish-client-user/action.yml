name: Build and publish client user app

inputs:
  keystore-path:
    required: true
  keystore-base64:
    required: true
  keystore-password:
    required: true
  key-alias:
    required: true
  key-password:
    required: true
  host:
    required: true

runs:
  using: composite
  steps:
    - name: Decode keystore
      shell: bash
      run: |
        mkdir -p "$(dirname "${{ inputs.keystore-path }}")"
        echo "${{ inputs.keystore-base64 }}" | base64 -d > "${{ inputs.keystore-path }}"

    - name: Generate environment
      shell: bash
      run: |
        ./gradlew :client:apps:user:core:generateEnvironment -Penvironment="production(android[KEYSTORE_PASSWORD=${{ inputs.keystore-password }},KEY_ALIAS=${{ inputs.key-alias }},KEY_PASSWORD=${{ inputs.key-password }},KEYSTORE_PATH=local/production-keystore.jks,IS_DEBUG=false,PROTOCOL=https,HOST=${{ inputs.host }}]:native[IS_DEBUG=false,PROTOCOL=https,HOST=${{ inputs.host }}]:wasm[IS_DEBUG=false])"

    - name: Select environment
      shell: bash
      run: |
        ./gradlew :client:apps:user:core:selectEnvironment -PnewSelectedEnvironment=production

    - name: Build apk
      shell: bash
      run: |
        ./gradlew :client:apps:user:core:assembleRelease

    - name: Publish apk
      uses: softprops/action-gh-release@v3
      with:
        files: |
          ./client/apps/user/core/build/outputs/apk/release/core-release.apk